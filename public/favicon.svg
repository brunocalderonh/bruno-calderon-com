<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Suprematist composition: cream ground, red disk, black wedge piercing upper-right -->
  <rect class="ground" width="64" height="64" fill="#f0ebe1"/>
  <circle cx="26" cy="38" r="22" fill="#c83228"/>
  <polygon class="wedge" points="40,28 62,5 62,24" fill="#1a1a1a"/>
  <style>
    @media (prefers-color-scheme: dark) {
      .ground { fill: #14110d; }
      .wedge  { fill: #ece9e0; }
    }
  </style>
</svg>
